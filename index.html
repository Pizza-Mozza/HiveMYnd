<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HiveMynd</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #340829;
      color: white;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .main-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      flex-grow: 1;
      padding: 20px;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    .site-header img {
      width: 40px;
      height: auto;
      margin: 0 10px;
    }

    .site-title {
      font-size: 2rem;
      font-weight: bold;
    }

    /* Poll */
    .poll-section {
      background: #340829;
      border: 2px solid #7e6007;
      border-radius: 12px;
      padding: 20px;
      margin: 15px auto;
      max-width: 80%;
      width: 500px;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .poll-header {
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
    }

    .poll-icon {
      width: 30px;
      height: auto;
      margin-right: 10px;
    }

    .vote-btn {
      position: relative;
      display: block;
      width: 100%;
      padding: 10px 15px;
      margin: 5px 0;
      font-size: 1.2rem;
      color: #340829;
      background: #cfe0e6;
      border: 2px solid #555;
      border-radius: 8px;
      text-align: left;
      cursor: pointer;
      overflow: hidden;
      transition: all 0.25s ease;
    }

    .vote-btn:hover {
      filter: brightness(1.2);
    }

    .vote-btn.disabled {
      cursor: default;
      opacity: 0.6;
    }

    .vote-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 0%;
      background: gold;
      border: 2px solid #555;
      z-index: 0;
      border-radius: 6px;
      transition: width 0.5s ease;
      display: none; 
    }

    .vote-text {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      width: 100%;
    }

    .winner {
      border-color: gold;
    }

    .users {
      font-size: 1rem;
      opacity: 0.8;
      margin-top: 10px;
    }

    .show-poll-btn {
      background-color: #7e6007;
      color: white;
      border: none;
      padding: 10px 20px;
      cursor: pointer;
      font-size: 1rem;
      margin: 15px auto;
      display: block;
      border-radius: 8px;
      text-align: center;
    }

    .hidden-poll {
      display: none;
    }

    /* Footer */
    footer {
      background-color: #340829;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: auto;
      font-size: 1rem;
    }

    /* Media Queries */
    @media (max-width: 600px) {
      .main-container {
        padding: 10px;
      }

      .poll-section {
        padding: 15px;
      }

      .site-header img {
        width: 30px;
      }

      .vote-btn {
        padding: 8px 10px;
      }

      .poll-header {
        font-size: 1rem;
      }

      .site-title {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <div class="main-container">
    <div class="site-header">
      <img src="https://upload.wikimedia.org/wikipedia/commons/8/83/Alv%C3%A9ole_d%27abeille.svg" alt="Logo Gauche">
      <span class="site-title">HiveMynd</span>
      <img src="https://upload.wikimedia.org/wikipedia/commons/8/83/Alv%C3%A9ole_d%27abeille.svg" alt="Logo Droite">
    </div>

    <div class="poll-section" data-poll-id="poll1">
      <div class="poll-header">
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/83/Alv%C3%A9ole_d%27abeille.svg" class="poll-icon" alt="icone abeille">
        Quel logo garde-t-on ?
      </div>
      <button class="vote-btn" data-index="0"><div class="vote-fill"></div><div class="vote-text"><span>Le premier Logo !</span><span class="percent" style="display: none;">0%</span></div></button>
      <button class="vote-btn" data-index="1"><div class="vote-fill"></div><div class="vote-text"><span>Le deuxième Logo !</span><span class="percent" style="display: none;">0%</span></div></button>
      <button class="vote-btn" data-index="2"><div class="vote-fill"></div><div class="vote-text"><span>Aucun des deux, ils sont moches...</span><span class="percent" style="display: none;">0%</span></div></button>
      <div class="users">👤 0 votants</div>
    </div>

    <button class="show-poll-btn" id="showPollBtn">Voir le sondage secret</button>

    <div class="poll-section hidden-poll" data-poll-id="poll2" id="poll2">
      <div class="poll-header">
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/83/Alv%C3%A9ole_d%27abeille.svg" class="poll-icon" alt="icone abeille">
        Est-ce que Arthur sort de la salle ?
      </div>
      <button class="vote-btn" data-index="0"><div class="vote-fill"></div><div class="vote-text"><span>OUI !</span><span class="percent" style="display: none;">0%</span></div></button>
      <button class="vote-btn" data-index="1"><div class="vote-fill"></div><div class="vote-text"><span>Non</span><span class="percent" style="display: none;">0%</span></div></button>
      <button class="vote-btn" data-index="2"><div class="vote-fill"></div><div class="vote-text"><span>Qu'il parte le plus loin possible ce goujat</span><span class="percent" style="display: none;">0%</span></div></button>
      <button class="vote-btn" data-index="3"><div class="vote-fill"></div><div class="vote-text"><span>La réponse D</span><span class="percent" style="display: none;">0%</span></div></button>
      <div class="users">👤 0 votants</div>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 HiveMynd. Tous droits réservés.</p>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA2XO5lhKHI5ljOhm0WyA7HsJnTF_o1KTw",
      authDomain: "hivemynd-cc260.firebaseapp.com",
      databaseURL: "https://hivemynd-cc260-default-rtdb.firebaseio.com/",
      projectId: "hivemynd-cc260",
      storageBucket: "hivemynd-cc260.firebasestorage.app",
      messagingSenderId: "79451616370",
      appId: "1:79451616370:web:8a841b3dcf257fff92feeb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const pollSections = document.querySelectorAll(".poll-section");

    const showPollBtn = document.getElementById("showPollBtn");
    const hiddenPoll = document.getElementById("poll2");

    let isPollVisible = false;

    showPollBtn.addEventListener("click", () => {
      isPollVisible = !isPollVisible; 
      if (isPollVisible) {
        hiddenPoll.style.display = "block"; 
        showPollBtn.innerText = "Cacher le sondage"; 
        hiddenPoll.style.display = "none"; 
        showPollBtn.innerText = "Voir le sondage caché"; 
      }
    });

    pollSections.forEach(section => {
      const pollId = section.dataset.pollId;
      const votesRef = ref(db, "votes/" + pollId);
      let votes = [0,0,0,0];
      let hasVoted = localStorage.getItem("voted_" + pollId) === "true";

      const buttons = section.querySelectorAll(".vote-btn");
      const percentElems = section.querySelectorAll(".percent");
      const usersElem = section.querySelector(".users");

      onValue(votesRef, snapshot => {
        const data = snapshot.val();
        if (data) votes = data;
        updateUI();
      });

      buttons.forEach(btn => {
        btn.addEventListener("click", () => {
          if (hasVoted) return;
          const index = parseInt(btn.dataset.index);

          hasVoted = true;
          localStorage.setItem("voted_" + pollId, "true");

          runTransaction(votesRef, currentVotes => {
            if (!Array.isArray(currentVotes) || currentVotes.length !== 4) currentVotes = [0,0,0,0];
            currentVotes[index]++;
            return currentVotes;
          });

          disableButtons();
        });
      });

      if (hasVoted) disableButtons();

      function updateUI() {
        const total = votes.reduce((a,b) => a+b, 0);
        const max = Math.max(...votes);
        usersElem.innerText = "👤 " + total + " votants";

        votes.forEach((v, i) => {
          const percent = total === 0 ? 0 : (v / total) * 100;
          const fill = buttons[i].querySelector(".vote-fill");
          const percentElem = percentElems[i];

          if (hasVoted) {
            fill.style.display = "block"; 
            percentElem.style.display = "inline"; 
            percentElem.innerText = percent.toFixed(1) + "%"; 
          } else {
            fill.style.display = "none"; 
            percentElem.style.display = "none";
          }

          fill.style.width = percent + "%";
          buttons[i].classList.remove("winner");
          if (v === max && max > 0) buttons[i].classList.add("winner");
        });
      }

      function disableButtons() {
        buttons.forEach(btn => btn.classList.add("disabled"));
      }
    });
  </script>
</body>
</html>
