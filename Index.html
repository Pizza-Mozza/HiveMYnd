<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>HyveMYnd</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    .vote-btn {
      height: 50vh;
      font-size: 2.2rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: all 0.25s ease;
      border: none;
    }

    .vote-btn:hover {
      transform: scale(1.03);
      filter: brightness(1.2);
    }

    .vote-btn:active {
      transform: scale(0.96);
    }

    .percent {
      font-size: 2rem;
      font-weight: bold;
    }

    .winner {
      box-shadow: inset 0 0 0 6px gold;
    }

    .disabled {
      pointer-events: none;
      opacity: 0.6;
    }

    #users {
      position: fixed;
      top: 10px;
      left: 15px;
      font-size: 1rem;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<div id="users">👤 0 votants</div>

<div class="container-fluid">
  <div class="row">
    <div class="col-6 p-1">
      <button id="btn0" class="vote-btn bg-primary w-100" onclick="vote(0)">
        Choix 1
        <div class="percent" id="p0">0%</div>
      </button>
    </div>
    <div class="col-6 p-1">
      <button id="btn1" class="vote-btn bg-success w-100" onclick="vote(1)">
        Choix 2
        <div class="percent" id="p1">0%</div>
      </button>
    </div>
  </div>

  <div class="row">
    <div class="col-6 p-1">
      <button id="btn2" class="vote-btn bg-warning w-100" onclick="vote(2)">
        Choix 3
        <div class="percent" id="p2">0%</div>
      </button>
    </div>
    <div class="col-6 p-1">
      <button id="btn3" class="vote-btn bg-danger w-100" onclick="vote(3)">
        Choix 4
        <div class="percent" id="p3">0%</div>
      </button>
    </div>
  </div>
</div>

<!-- Firebase Script -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // 🔑 Ajoute tes informations Firebase ici
  const firebaseConfig = {
    apiKey: "AIzaSyA2XO5lhKHI5ljOhm0WyA7HsJnTF_o1KTw",
    authDomain: "hivemynd-cc260.firebaseapp.com",
    databaseURL: "https://hivemynd-cc260-default-rtdb.firebaseio.com/",
    projectId: "hivemynd-cc260",
    storageBucket: "hivemynd-cc260.firebasestorage.app",
    messagingSenderId: "79451616370",
    appId: "1:79451616370:web:8a841b3dcf257fff92feeb"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const votesRef = ref(db, "votes");

  let votes = [0,0,0,0];
  let hasVoted = false;

  // 🔄 écouter en temps réel
  onValue(votesRef, (snapshot) => {
    const data = snapshot.val();
    if (data) {
      votes = data;
      updateUI();
    }
  });

  // 🗳️ fonction de vote
  window.vote = function(index) {
    if (hasVoted) return;

    hasVoted = true;
    localStorage.setItem("voted", "true");

    runTransaction(votesRef, (currentVotes) => {
      if (currentVotes === null) {
        return [0,0,0,0];
      }

      currentVotes[index]++;
      return currentVotes;
    });

    disableButtons();
  };

  // 🔒 vérifier si déjà voté
  if (localStorage.getItem("voted")) {
    hasVoted = true;
    disableButtons();
  }

  // 🎨 UI
  function updateUI() {
    let total = votes.reduce((a, b) => a + b, 0);
    let max = Math.max(...votes);

    document.getElementById("users").innerText = "👤 " + total + " votants";

    for (let i = 0; i < 4; i++) {
      let percent = total === 0 ? 0 : (votes[i] / total) * 100;

      document.getElementById("p" + i).innerText = percent.toFixed(1) + "%";

      let btn = document.getElementById("btn" + i);
      btn.classList.remove("winner");

      if (votes[i] === max && max > 0) {
        btn.classList.add("winner");
      }
    }
  }

  // 🔒 désactiver les boutons après le vote
  function disableButtons() {
    for (let i = 0; i < 4; i++) {
      document.getElementById("btn" + i).classList.add("disabled");
    }
  }
</script>

</body>
</html>
