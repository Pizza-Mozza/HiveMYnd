<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Vote Live Demo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    .vote-btn {
      height: 50vh;
      font-size: 2.2rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: all 0.25s ease;
      border: none;
    }

    .vote-btn:hover {
      transform: scale(1.03);
      filter: brightness(1.2);
    }

    .vote-btn:active {
      transform: scale(0.96);
    }

    .percent {
      font-size: 2rem;
      font-weight: bold;
    }

    .winner {
      box-shadow: inset 0 0 0 6px gold;
    }

    .disabled {
      pointer-events: none;
      opacity: 0.6;
    }

    #users {
      position: fixed;
      top: 10px;
      left: 15px;
      font-size: 1rem;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<div id="users">👤 0 votants</div>

<div class="container-fluid">
  <div class="row">
    <div class="col-6 p-1">
      <button id="btn0" class="vote-btn bg-primary w-100" onclick="vote(0)">
        Choix 1
        <div class="percent" id="p0">0%</div>
      </button>
    </div>
    <div class="col-6 p-1">
      <button id="btn1" class="vote-btn bg-success w-100" onclick="vote(1)">
        Choix 2
        <div class="percent" id="p1">0%</div>
      </button>
    </div>
  </div>

  <div class="row">
    <div class="col-6 p-1">
      <button id="btn2" class="vote-btn bg-warning w-100" onclick="vote(2)">
        Choix 3
        <div class="percent" id="p2">0%</div>
      </button>
    </div>
    <div class="col-6 p-1">
      <button id="btn3" class="vote-btn bg-danger w-100" onclick="vote(3)">
        Choix 4
        <div class="percent" id="p3">0%</div>
      </button>
    </div>
  </div>
</div>

<script>
const API_URL = "https://api.jsonbin.io/v3/b/YOUR_BIN_ID";
const API_KEY = "YOUR_API_KEY";

let votes = [0,0,0,0];
let hasVoted = false;

// 🎯 animation fluide
function animateValue(element, start, end) {
  let range = end - start;
  let step = range / 10;
  let current = start;

  let interval = setInterval(() => {
    current += step;
    element.innerText = current.toFixed(1) + "%";

    if ((step > 0 && current >= end) || (step < 0 && current <= end)) {
      element.innerText = end.toFixed(1) + "%";
      clearInterval(interval);
    }
  }, 30);
}

// 🔄 charger votes
async function loadVotes() {
  try {
    const res = await fetch(API_URL, {
      headers: { "X-Master-Key": API_KEY }
    });

    const data = await res.json();
    votes = data.record.votes;

    updateUI();
  } catch(e) {
    console.log("Erreur API");
  }
}

// 🗳️ voter
async function vote(index) {
  if (hasVoted) return;

  votes[index]++;
  hasVoted = true;

  await fetch(API_URL, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "X-Master-Key": API_KEY
    },
    body: JSON.stringify({ votes })
  });

  disableButtons();
  updateUI();
}

// 🎨 UI
function updateUI() {
  let total = votes.reduce((a,b)=>a+b,0);
  let max = Math.max(...votes);

  document.getElementById("users").innerText = "👤 " + total + " votants";

  for (let i=0;i<4;i++) {
    let percent = total===0 ? 0 : (votes[i]/total)*100;

    let el = document.getElementById("p"+i);
    let current = parseFloat(el.innerText) || 0;

    animateValue(el, current, percent);

    let btn = document.getElementById("btn"+i);
    btn.classList.remove("winner");

    if (votes[i] === max && max > 0) {
      btn.classList.add("winner");
    }
  }
}

// 🔒 disable après vote
function disableButtons() {
  for (let i=0;i<4;i++) {
    document.getElementById("btn"+i).classList.add("disabled");
  }
}

// 🔁 refresh auto (illusion live)
setInterval(loadVotes, 1500);

// init
loadVotes();
</script>

</body>
</html>
